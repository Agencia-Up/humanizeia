server {
    listen 80;
    
    # Compressão GZIP para o site carregar mais rápido
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # API bridge para o Supabase Edge Functions no ambiente de teste.
    # /api/meta/login    -> /functions/v1/meta-oauth/meta/login
    # /api/meta/callback -> /functions/v1/meta-oauth/meta/callback
    location /api/ {
        proxy_pass https://ezoltigtqgbmftmiwjxh.supabase.co/functions/v1/meta-oauth/;
        proxy_ssl_server_name on;
        proxy_set_header Host ezoltigtqgbmftmiwjxh.supabase.co;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Logosia-Origin $scheme://$host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # index.html NUNCA é cacheado pelo navegador — ele sempre revalida e pega
        # a referência dos chunks (.js com hash) mais novos. Sem isso o usuário
        # ficava preso na versão antiga em cache mesmo após o deploy.
        add_header Cache-Control "no-cache, must-revalidate";
        etag on;

        # Configuração OBRIGATÓRIA para o React Router funcionar (não dar erro 404 em sub-páginas)
        try_files $uri $uri/ /index.html;
    }
    
    # Cache forte para arquivos estáticos (js, css, imagens)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
