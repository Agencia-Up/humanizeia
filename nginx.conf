server {
    listen 80;

    resolver 1.1.1.1 8.8.8.8 valid=300s;
    
    # Compressão GZIP para o site carregar mais rápido
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # Configuração OBRIGATÓRIA para o React Router funcionar (não dar erro 404 em sub-páginas)
        try_files $uri $uri/ /index.html;
    }

    location /supabase/ {
        proxy_pass https://seyljsqmhlopkcauhlor.supabase.co/;
        proxy_ssl_server_name on;
        proxy_set_header Host seyljsqmhlopkcauhlor.supabase.co;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }
    
    # Cache forte para arquivos estáticos (js, css, imagens)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
